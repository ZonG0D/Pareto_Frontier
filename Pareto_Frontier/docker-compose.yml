version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: pareto-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  pareto:
    build: .
    container_name: pareto-cli
    depends_on:
      - ollama
    environment:
      - OLLAMA_ENDPOINT=http://ollama:11434/api/chat
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true

volumes:
  ollama_data:
